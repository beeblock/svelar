# PostgreSQL Configuration Template
# Optimized for different workloads

# ============================================================================
# MEMORY CONFIGURATION
# ============================================================================

# For 32GB RAM, OLTP workload
# shared_buffers = 8GB                    # 25% of RAM
# effective_cache_size = 24GB             # 75% of RAM
# maintenance_work_mem = 2GB              # For VACUUM, CREATE INDEX
# work_mem = 32MB                         # Per operation
# wal_buffers = 16MB

# For 64GB RAM, mixed OLTP/OLAP workload
# shared_buffers = 16GB
# effective_cache_size = 48GB
# maintenance_work_mem = 4GB
# work_mem = 64MB
# wal_buffers = 16MB

# For 128GB RAM, analytics workload
shared_buffers = 32GB                    # Don't exceed 40% of RAM
effective_cache_size = 96GB
maintenance_work_mem = 8GB
work_mem = 256MB                         # Higher for complex queries
wal_buffers = 16MB

# ============================================================================
# CONNECTION CONFIGURATION
# ============================================================================

max_connections = 100                    # Total connections allowed
# Use PgBouncer for connection pooling instead of increasing this

# ============================================================================
# WAL (WRITE-AHEAD LOG) CONFIGURATION
# ============================================================================

wal_level = replica                      # minimal, replica, or logical
min_wal_size = 1GB                       # Minimum WAL kept
max_wal_size = 4GB                       # Checkpoint triggered if exceeded
wal_compression = on                     # Compress WAL (PG 9.5+)

# Checkpoint tuning
checkpoint_completion_target = 0.9       # Spread checkpoint I/O
checkpoint_timeout = 15min               # Maximum time between checkpoints

# Synchronous commit (durability vs performance)
synchronous_commit = on                  # on, off, remote_write, remote_apply, local
# synchronous_commit = off               # Faster, risk losing recent commits on crash

# For replication
max_wal_senders = 5                      # Number of replication connections
wal_keep_size = 1GB                      # WAL retention (PG 13+)
# wal_keep_segments = 64                 # For PG < 13
hot_standby = on                         # Allow queries on standby

# For point-in-time recovery
# archive_mode = on
# archive_command = 'test ! -f /mnt/backup/wal/%f && cp %p /mnt/backup/wal/%f'
# archive_timeout = 300                  # Force WAL switch every 5 minutes

# ============================================================================
# QUERY PLANNER CONFIGURATION
# ============================================================================

# Cost-based planner settings
random_page_cost = 1.1                   # For SSDs (default 4.0 for HDD)
seq_page_cost = 1.0                      # Sequential page cost
cpu_tuple_cost = 0.01                    # Cost of processing a tuple
cpu_index_tuple_cost = 0.005             # Cost of processing an index entry
cpu_operator_cost = 0.0025               # Cost of processing an operator

# Parallel query settings (PG 9.6+)
max_parallel_workers_per_gather = 4      # Max parallel workers per query
max_parallel_workers = 8                 # Total parallel workers
max_worker_processes = 8                 # Total background processes
parallel_setup_cost = 1000               # Cost of setting up parallel query
parallel_tuple_cost = 0.1                # Cost per tuple in parallel mode

# Effective I/O concurrency
effective_io_concurrency = 200           # For SSDs (1 for HDD)
maintenance_io_concurrency = 10          # For maintenance operations

# ============================================================================
# AUTOVACUUM CONFIGURATION
# ============================================================================

autovacuum = on
autovacuum_max_workers = 3
autovacuum_naptime = 10s                 # Check interval
autovacuum_vacuum_threshold = 50         # Minimum dead tuples
autovacuum_vacuum_scale_factor = 0.05    # 5% dead tuples triggers VACUUM
autovacuum_analyze_threshold = 50
autovacuum_analyze_scale_factor = 0.02   # 2% changes triggers ANALYZE
autovacuum_vacuum_cost_delay = 2ms       # Throttle to reduce I/O impact
autovacuum_vacuum_cost_limit = 200

# ============================================================================
# LOGGING CONFIGURATION
# ============================================================================

logging_collector = on
log_directory = 'log'
log_filename = 'postgresql-%Y-%m-%d_%H%M%S.log'
log_rotation_age = 1d
log_rotation_size = 100MB

# What to log
log_min_duration_statement = 1000        # Log queries > 1 second
log_line_prefix = '%t [%p]: [%l-1] user=%u,db=%d,app=%a,client=%h '
log_checkpoints = on
log_connections = on
log_disconnections = on
log_duration = off
log_lock_waits = on                      # Log lock waits
log_statement = 'none'                   # none, ddl, mod, all
log_temp_files = 0                       # Log temp files > 0 bytes

# For pg_stat_statements
shared_preload_libraries = 'pg_stat_statements'
pg_stat_statements.track = all
pg_stat_statements.max = 10000

# ============================================================================
# STATISTICS CONFIGURATION
# ============================================================================

track_activities = on
track_counts = on
track_io_timing = on                     # Track I/O timing (slight overhead)
track_functions = all                    # Track function calls

# ============================================================================
# CLIENT CONNECTION DEFAULTS
# ============================================================================

default_statistics_target = 100          # Increase for better stats (max 10000)
# timezone = 'UTC'
# lc_messages = 'en_US.UTF-8'
# lc_monetary = 'en_US.UTF-8'
# lc_numeric = 'en_US.UTF-8'
# lc_time = 'en_US.UTF-8'
# default_text_search_config = 'pg_catalog.english'

# ============================================================================
# LOCK MANAGEMENT
# ============================================================================

max_locks_per_transaction = 64
max_pred_locks_per_transaction = 64

# ============================================================================
# ERROR HANDLING
# ============================================================================

exit_on_error = off
restart_after_crash = on

# ============================================================================
# NOTES
# ============================================================================

# After changing this configuration:
# 1. Verify syntax: postgres -C config_file=/path/to/postgresql.conf
# 2. Reload config: SELECT pg_reload_conf();
#    or: systemctl reload postgresql
# 3. Some changes require restart: systemctl restart postgresql
# 4. Monitor performance after changes
# 5. Adjust based on actual workload patterns
#
# For connection pooling, use PgBouncer instead of increasing max_connections
# For replication, see high-availability.md reference
