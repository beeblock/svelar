name: Security

on:
  pull_request:
    paths:
      - package.json
      - package-lock.json
      - "packages/**/package.json"
      - ".github/workflows/security.yml"
      - ".github/dependabot.yml"
  push:
    branches:
      - main
    paths:
      - package.json
      - package-lock.json
      - "packages/**/package.json"
      - ".github/workflows/security.yml"
      - ".github/dependabot.yml"
  schedule:
    - cron: "0 12 * * 1"
  workflow_dispatch:

jobs:
  audit:
    name: npm audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit high and critical vulnerabilities
        run: npm run security:audit

      - name: Print full audit report
        if: failure()
        run: npm run security:audit:all || true
